services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./task_tracker.db
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      VUE_APP_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    user: "node"
    working_dir: /app
    command: npm run serve -- --port 8080 --host 0.0.0.0
    networks:
      - app-network

volumes:
  sqlite_data:

networks:
  app-network:
    driver: bridge